<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>도쿄여행</title>
  <meta name="description" content="2026년 5월 30일부터 6월 2일까지 4인 도쿄여행 일정 가이드">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%231c4134'/%3E%3Cpath d='M13 43h38l-8-18-8 11-7-17-6 15-4-7z' fill='%23f1b84b'/%3E%3Ccircle cx='46' cy='18' r='6' fill='%23e9f4d9'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=IBM+Plex+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #15201c;
      --muted: #65716b;
      --subtle: #8a948d;
      --paper: #fbf4e8;
      --card: rgba(255, 255, 255, 0.88);
      --card-solid: #fffdf8;
      --line: rgba(21, 32, 28, 0.12);
      --green: #227455;
      --green-dark: #143f31;
      --mint: #dff2df;
      --sand: #eadcc2;
      --gold: #f0b84b;
      --orange: #ea7b52;
      --blue: #3a7289;
      --shadow: 0 18px 56px rgba(37, 52, 45, 0.13);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --max: 1040px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, rgba(240, 184, 75, 0.35), transparent 30rem),
        radial-gradient(circle at 98% 8%, rgba(34, 116, 85, 0.22), transparent 33rem),
        linear-gradient(135deg, #fbf4e8 0%, #f4ead9 48%, #e8f2e5 100%);
      font-family: "IBM Plex Sans KR", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      line-height: 1.55;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(21, 32, 28, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(21, 32, 28, 0.035) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.72), transparent 70%);
    }

    a {
      color: inherit;
    }

    button,
    a,
    [role="link"] {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      font: inherit;
    }

    .page {
      width: min(var(--max), calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 72px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 18px;
      padding: clamp(20px, 4vw, 34px);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 251, 243, 0.80));
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "TOKYO";
      position: absolute;
      right: -12px;
      bottom: -36px;
      color: rgba(21, 32, 28, 0.055);
      font-family: "Gowun Dodum", serif;
      font-size: clamp(72px, 18vw, 180px);
      letter-spacing: -0.08em;
      line-height: 1;
      pointer-events: none;
    }

    .hero-top {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      margin: 0 0 10px;
      padding: 7px 12px;
      border-radius: 999px;
      color: var(--green-dark);
      background: rgba(223, 242, 223, 0.82);
      font-size: 13px;
      font-weight: 800;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-family: "Gowun Dodum", "IBM Plex Sans KR", serif;
      font-size: clamp(44px, 8vw, 82px);
      line-height: 0.98;
      letter-spacing: -0.07em;
    }

    .hero-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .hero-summary li {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 7px 11px;
      border: 1px solid rgba(21, 32, 28, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      color: #3d4943;
      font-size: 14px;
      font-weight: 800;
    }

    .quick-actions {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
    }

    .action-chip,
    .route-button,
    .source-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 46px;
      padding: 10px 12px;
      border: 1px solid rgba(21, 32, 28, 0.10);
      border-radius: 999px;
      color: var(--green-dark);
      background: rgba(255, 255, 255, 0.86);
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .action-chip:hover,
    .route-button:hover,
    .source-link:hover,
    .place-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(37, 52, 45, 0.13);
    }

    .map-card.focused {
      border-color: rgba(34, 116, 85, 0.36);
      box-shadow: 0 18px 46px rgba(34, 116, 85, 0.18);
    }

    .action-chip.primary,
    .route-button.primary {
      color: #fff;
      background: var(--green);
      border-color: transparent;
      box-shadow: 0 12px 26px rgba(34, 116, 85, 0.22);
    }

    .mini-card {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .mini-card article {
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.75);
    }

    .mini-card b {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
      color: var(--green-dark);
    }

    .mini-card span {
      color: #3d4943;
      font-size: 14px;
      font-weight: 700;
    }

    .tabs-shell {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: 18px -4px 0;
      padding: 8px 4px;
      background: linear-gradient(to bottom, rgba(251, 244, 232, 0.96), rgba(251, 244, 232, 0.72));
      backdrop-filter: blur(14px);
      overflow-x: auto;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 8px;
      min-width: 580px;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 12px 30px rgba(37, 52, 45, 0.09);
    }

    .tab {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      background: transparent;
      font-weight: 900;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease, transform 150ms ease;
    }

    .tab:hover {
      transform: translateY(-1px);
      color: var(--ink);
      background: rgba(34, 116, 85, 0.08);
    }

    .tab[aria-selected="true"] {
      color: #fff;
      background: var(--green-dark);
      box-shadow: 0 10px 22px rgba(20, 63, 49, 0.24);
    }

    .day-panel {
      display: none;
      margin-top: 14px;
      animation: rise 260ms ease both;
    }

    .day-panel.active {
      display: block;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .day-hero,
    .section-card,
    .place-card,
    .map-card,
    .extra-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--card);
      box-shadow: 0 12px 34px rgba(37, 52, 45, 0.09);
      backdrop-filter: blur(14px);
    }

    .day-hero {
      padding: clamp(18px, 3vw, 26px);
    }

    .day-title-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .day-kicker {
      color: var(--green);
      font-size: 14px;
      font-weight: 900;
    }

    .day-hero h2 {
      margin-bottom: 0;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: -0.045em;
    }

    .narrative {
      margin: 0 0 16px;
      color: #39473f;
      font-size: clamp(18px, 2.5vw, 22px);
      font-weight: 800;
    }

    .time-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    .time-pill {
      min-height: 66px;
      padding: 11px;
      border: 1px solid rgba(21, 32, 28, 0.08);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.70);
    }

    .time-pill time {
      display: block;
      color: var(--green-dark);
      font-size: 16px;
      font-weight: 900;
    }

    .time-pill span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .route-flow {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 0 0 14px;
      padding: 13px;
      border: 1px dashed rgba(34, 116, 85, 0.24);
      border-radius: 20px;
      background: rgba(223, 242, 223, 0.40);
    }

    .route-node {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 7px 11px;
      border: 1px solid rgba(21, 32, 28, 0.09);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 8px 14px rgba(37, 52, 45, 0.06);
    }

    .route-arrow {
      color: var(--green);
      font-weight: 900;
    }

    .route-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(300px, 0.95fr);
      gap: 14px;
      align-items: start;
      margin-top: 14px;
    }

    .section-card {
      padding: 18px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 12px;
      font-size: 19px;
      letter-spacing: -0.02em;
    }

    .places {
      display: grid;
      gap: 10px;
    }

    .place-card {
      position: relative;
      display: block;
      width: 100%;
      padding: 16px;
      color: inherit;
      text-align: left;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
    }

    .place-card.active {
      border-color: rgba(34, 116, 85, 0.48);
      background:
        linear-gradient(135deg, rgba(223, 242, 223, 0.58), rgba(255, 255, 255, 0.92));
      box-shadow: 0 16px 36px rgba(34, 116, 85, 0.16);
    }

    .place-card:focus-visible,
    .tab:focus-visible,
    .action-chip:focus-visible,
    .route-button:focus-visible,
    .source-link:focus-visible {
      outline: 3px solid rgba(240, 184, 75, 0.75);
      outline-offset: 3px;
    }

    .place-top {
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr) 28px;
      gap: 11px;
      align-items: start;
    }

    .icon-box {
      display: inline-grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 16px;
      background: var(--mint);
      font-size: 22px;
    }

    .place-card h3 {
      margin: 0 0 3px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .place-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .external-mark {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      color: var(--green-dark);
      background: rgba(223, 242, 223, 0.9);
      font-weight: 900;
    }

    .place-card.active .external-mark {
      color: #fff;
      background: var(--green);
    }

    .place-facts {
      display: grid;
      gap: 7px;
      margin-top: 13px;
    }

    .fact {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      min-height: 30px;
      color: #3f4d45;
      font-size: 14px;
      font-weight: 750;
    }

    .fact-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--green-dark);
      background: rgba(223, 242, 223, 0.78);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .fact-label.caution {
      color: #693111;
      background: #ffe0c8;
    }

    .fact-label.tip {
      color: #5a3b0a;
      background: #ffe6a6;
    }

    .place-links {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 12px;
    }

    .source-link {
      min-height: 40px;
      padding: 8px 12px;
      color: var(--green-dark);
      font-size: 13px;
      background: rgba(255, 255, 255, 0.78);
    }

    .map-card {
      overflow: hidden;
      background: var(--card-solid);
    }

    .map-card iframe {
      display: block;
      width: 100%;
      min-height: 300px;
      border: 0;
      background: var(--sand);
    }

    .map-caption {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding: 13px 14px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .map-title {
      display: block;
      color: var(--green-dark);
      font-size: 15px;
      font-weight: 900;
    }

    .map-subtitle {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .extras {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .extra-card {
      padding: 15px;
    }

    .extra-card h3 {
      display: flex;
      gap: 7px;
      align-items: center;
      margin-bottom: 6px;
      font-size: 16px;
    }

    .extra-card p {
      margin-bottom: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .screen-reader {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .hero-top,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .quick-actions,
      .mini-card {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 18px, var(--max));
        padding-top: 10px;
      }

      .hero {
        border-radius: 26px;
      }

      .quick-actions,
      .mini-card,
      .time-strip,
      .extras {
        grid-template-columns: 1fr;
      }

      .tabs-shell {
        margin-left: -9px;
        margin-right: -9px;
        padding-left: 9px;
        padding-right: 9px;
      }

      .day-hero,
      .section-card {
        padding: 16px;
      }

      .route-flow {
        display: grid;
        grid-template-columns: 1fr;
      }

      .route-arrow {
        justify-self: center;
        transform: rotate(90deg);
      }

      .route-actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .route-button {
        justify-content: flex-start;
        min-height: 50px;
        padding-left: 16px;
      }

      .map-card iframe {
        min-height: 250px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="page-title">
      <div class="hero-top">
        <div>
          <p class="eyebrow">4명이 함께 보는 여행 가이드</p>
          <h1 id="page-title">도쿄여행</h1>
          <ul class="hero-summary" aria-label="여행 기본 정보">
            <li>📅 5/30 토 - 6/2 화</li>
            <li>👥 4명</li>
            <li>🏨 컴포트 인 도쿄 롯폰기</li>
          </ul>
        </div>
        <div class="quick-actions" aria-label="빠른 이동">
          <a class="action-chip primary" href="#daily-plan">📍 일정</a>
          <a class="action-chip" href="https://www.google.com/maps/search/?api=1&query=Comfort+Inn+Tokyo+Roppongi" target="_blank" rel="noreferrer">🏨 숙소</a>
          <a class="action-chip" href="https://www.google.com/maps/dir/?api=1&origin=Narita+Airport+Terminal+1&destination=Tokyo+Station&travelmode=transit" target="_blank" rel="noreferrer">✈️ 공항</a>
          <a class="action-chip" href="https://www.google.com/maps/search/?api=1&query=Roppongi+Tokyo" target="_blank" rel="noreferrer">🗺️ 지도</a>
        </div>
      </div>

      <div class="mini-card" aria-label="고정 정보">
        <article>
          <b>출국</b>
          <span>ICN 07:25 → NRT 09:55 · LJ201</span>
        </article>
        <article>
          <b>귀국</b>
          <span>NRT 18:25 → ICN 20:55 · LJ210</span>
        </article>
        <article>
          <b>고정</b>
          <span>해리포터 5/31 10:00</span>
        </article>
        <article>
          <b>고정</b>
          <span>시부야 스카이 5/31 16:00</span>
        </article>
      </div>
    </section>

    <section id="daily-plan" aria-label="일별 일정">
      <div class="tabs-shell" role="navigation" aria-label="날짜 선택">
        <div class="tabs" role="tablist" id="day-tabs"></div>
      </div>
      <div id="day-panels"></div>
    </section>
  </main>

  <template id="day-panel-template">
    <article class="day-panel" role="tabpanel">
      <section class="day-hero">
        <div class="day-title-row">
          <div>
            <div class="day-kicker"></div>
            <h2></h2>
          </div>
        </div>
        <p class="narrative"></p>
        <div class="time-strip"></div>
        <div class="route-flow"></div>
        <div class="route-actions"></div>
      </section>

      <div class="content-grid">
        <section class="section-card">
          <h2 class="section-title">📌 장소</h2>
          <div class="places"></div>
        </section>
        <aside class="map-card">
          <iframe loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          <div class="map-caption">
            <span></span>
            <a class="source-link" target="_blank" rel="noreferrer">지도 ↗</a>
          </div>
        </aside>
      </div>

      <section class="extras" aria-label="추가 정보"></section>
    </article>
  </template>

  <script>
    const maps = {
      hotel: "https://www.google.com/maps/search/?api=1&query=Comfort+Inn+Tokyo+Roppongi",
      hotelEmbed: "https://maps.google.com/maps?q=Comfort%20Inn%20Tokyo%20Roppongi&z=16&output=embed",
      narita: "https://www.google.com/maps/search/?api=1&query=Narita+Airport+Terminal+1",
      naritaEmbed: "https://maps.google.com/maps?q=Narita%20Airport%20Terminal%201&z=13&output=embed",
      tokyoStation: "https://www.google.com/maps/search/?api=1&query=Tokyo+Station",
      tokyoStationEmbed: "https://maps.google.com/maps?q=Tokyo%20Station&z=14&output=embed",
      pokemonDx: "https://www.google.com/maps/search/?api=1&query=Pokemon+Center+Tokyo+DX",
      pokemonDxEmbed: "https://maps.google.com/maps?q=Pokemon%20Center%20Tokyo%20DX&z=16&output=embed",
      kokyo: "https://www.google.com/maps/search/?api=1&query=Kokyo+Gaien+Tokyo",
      kokyoEmbed: "https://maps.google.com/maps?q=Kokyo%20Gaien%20Tokyo&z=15&output=embed",
      saho: "https://www.google.com/maps/search/?api=1&query=Cafe+Dining+Saho+Roppongi+Tokyo",
      sahoEmbed: "https://maps.google.com/maps?q=Cafe%20Dining%20Saho%20Roppongi%20Tokyo&z=16&output=embed",

    const tabsRoot = document.querySelector("#day-tabs");
    const panelsRoot = document.querySelector("#day-panels");
    const panelTemplate = document.querySelector("#day-panel-template");

    function openExternal(url) {
      window.open(url, "_blank", "noopener,noreferrer");
    }

    function createFact(label, value, type = "") {
      if (!value) return null;
      const fact = document.createElement("div");
      fact.className = "fact";
      const factLabel = document.createElement("span");
      factLabel.className = `fact-label ${type}`.trim();
      factLabel.textContent = label;
      const factValue = document.createElement("span");
      factValue.textContent = value;
      fact.append(factLabel, factValue);
      return fact;
    }

    function setMapCaption(panel, title, subtitle, url) {
      const captionText = panel.querySelector(".map-caption span");
      captionText.innerHTML = `<span class="map-title">${title}</span><span class="map-subtitle">${subtitle}</span>`;
      const mapLink = panel.querySelector(".map-caption a");
      mapLink.href = url;
      mapLink.textContent = "지도 ↗";
    }

    function focusPlaceMap(panel, place, card, shouldScroll = false) {
      const iframe = panel.querySelector("iframe");
      const mapCard = panel.querySelector(".map-card");
      iframe.src = place.embedUrl || place.mapUrl;
      iframe.title = `${place.name} 지도`;
      setMapCaption(panel, place.name, place.action, place.mapUrl);

      panel.querySelectorAll(".place-card").forEach((item) => {
        item.classList.toggle("active", item === card);
      });
      mapCard.classList.add("focused");

      if (shouldScroll && window.matchMedia("(max-width: 900px)").matches) {
        mapCard.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function createPlaceCard(place) {
      const card = document.createElement("article");
      card.className = "place-card";
      card.tabIndex = 0;
      card.role = "button";
      card.setAttribute("aria-label", `${place.name} 지도 미리보기`);
      card.dataset.mapUrl = place.mapUrl;
      card.dataset.embedUrl = place.embedUrl || "";

      const top = document.createElement("div");
      top.className = "place-top";
      const icon = document.createElement("div");
      icon.className = "icon-box";
      icon.setAttribute("aria-hidden", "true");
      icon.textContent = iconMap[place.icon] || "📍";

      const copy = document.createElement("div");
      const title = document.createElement("h3");
      title.textContent = place.name;
      const action = document.createElement("p");
      action.textContent = place.action;
      copy.append(title, action);

      const mark = document.createElement("span");
      mark.className = "external-mark";
      mark.setAttribute("aria-hidden", "true");
      mark.textContent = "⌖";
      top.append(icon, copy, mark);

      const facts = document.createElement("div");
      facts.className = "place-facts";
      [
        createFact("시간", place.time),
        createFact("준비", place.prepare),
        createFact("주의", place.caution, "caution"),
        createFact("팁", place.tip, "tip")
      ].filter(Boolean).forEach((fact) => facts.append(fact));

      const links = document.createElement("div");
      links.className = "place-links";
      const mapLink = document.createElement("a");
      mapLink.className = "source-link";
      mapLink.href = place.mapUrl;
      mapLink.target = "_blank";
      mapLink.rel = "noreferrer";
      mapLink.textContent = "🗺️ 지도";
      mapLink.addEventListener("click", (event) => event.stopPropagation());
      links.append(mapLink);

      (place.sources || []).forEach(([label, url]) => {
        const source = document.createElement("a");
        source.className = "source-link";
        source.href = url;
        source.target = "_blank";
        source.rel = "noreferrer";
        source.textContent = `${label} ↗`;
        source.addEventListener("click", (event) => event.stopPropagation());
        links.append(source);
      });

      card.append(top, facts, links);
      return card;
    }

    function renderDay(day, index) {
      const tab = document.createElement("button");
      tab.className = "tab";
      tab.type = "button";
      tab.role = "tab";
      tab.id = `tab-${day.id}`;
      tab.dataset.day = day.id;
      tab.setAttribute("aria-controls", day.id);
      tab.setAttribute("aria-selected", String(index === 0));
      tab.textContent = `${day.label} · ${day.date}`;
      tabsRoot.append(tab);

      const panel = panelTemplate.content.firstElementChild.cloneNode(true);
      panel.id = day.id;
      panel.setAttribute("aria-labelledby", tab.id);
      if (index === 0) panel.classList.add("active");
      panel.querySelector(".day-kicker").textContent = day.date;
      panel.querySelector(".day-hero h2").textContent = `${day.label} · ${day.title}`;
      panel.querySelector(".narrative").textContent = day.narrative;

      const timeStrip = panel.querySelector(".time-strip");
      day.times.forEach(([time, label]) => {
        const item = document.createElement("div");
        item.className = "time-pill";
        item.innerHTML = `<time>${time}</time><span>${label}</span>`;
        timeStrip.append(item);
      });

      const routeFlow = panel.querySelector(".route-flow");
      day.route.forEach((node, nodeIndex) => {
        const routeNode = document.createElement("span");
        routeNode.className = "route-node";
        routeNode.textContent = node;
        routeFlow.append(routeNode);
        if (nodeIndex < day.route.length - 1) {
          const arrow = document.createElement("span");
          arrow.className = "route-arrow";
          arrow.textContent = "→";
          routeFlow.append(arrow);
        }
      });

      const routeActions = panel.querySelector(".route-actions");
      day.routeActions.forEach(([label, url, primary]) => {
        const link = document.createElement("a");
        link.className = `route-button ${primary ? "primary" : ""}`.trim();
        link.href = url;
        link.target = "_blank";
        link.rel = "noreferrer";
        link.textContent = label;
        routeActions.append(link);
      });

      const places = panel.querySelector(".places");
      day.places.forEach((place) => {
        const card = createPlaceCard(place);
        card.addEventListener("click", () => focusPlaceMap(panel, place, card, true));
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            focusPlaceMap(panel, place, card, true);
          }
        });
        places.append(card);
      });

      const iframe = panel.querySelector("iframe");
      iframe.title = `${day.label} 지도`;
      iframe.src = day.map.embed;
      setMapCaption(panel, day.map.caption, "장소 카드를 누르면 이 지도가 바뀝니다.", day.map.url);

      const extras = panel.querySelector(".extras");
      day.extras.forEach(([title, body]) => {
        const item = document.createElement("article");
        item.className = "extra-card";
        item.innerHTML = `<h3>${title}</h3><p>${body}</p>`;
        extras.append(item);
      });

      panelsRoot.append(panel);
    }

    function activate(dayId, updateHash = true) {
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.setAttribute("aria-selected", String(tab.dataset.day === dayId));
      });
      document.querySelectorAll(".day-panel").forEach((panel) => {
        panel.classList.toggle("active", panel.id === dayId);
      });
      if (updateHash) history.replaceState(null, "", `#${dayId}`);
    }

    tripDays.forEach(renderDay);

    tabsRoot.addEventListener("click", (event) => {
      const tab = event.target.closest(".tab");
      if (!tab) return;
      activate(tab.dataset.day);
    });

    const initialDay = location.hash.replace("#", "");
    if (tripDays.some((day) => day.id === initialDay)) {
      activate(initialDay, false);
    }
  </script>
</body>
</html>
