<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>도쿄여행</title>
  <meta name="description" content="2026년 5월 30일부터 6월 2일까지 4인 도쿄여행 일정 가이드">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%231c4134'/%3E%3Cpath d='M13 43h38l-8-18-8 11-7-17-6 15-4-7z' fill='%23f1b84b'/%3E%3Ccircle cx='46' cy='18' r='6' fill='%23e9f4d9'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=IBM+Plex+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #15201c;
      --muted: #65716b;
      --subtle: #8a948d;
      --paper: #fbf4e8;
      --card: rgba(255, 255, 255, 0.88);
      --card-solid: #fffdf8;
      --line: rgba(21, 32, 28, 0.12);
      --green: #227455;
      --green-dark: #143f31;
      --mint: #dff2df;
      --sand: #eadcc2;
      --gold: #f0b84b;
      --orange: #ea7b52;
      --blue: #3a7289;
      --shadow: 0 18px 56px rgba(37, 52, 45, 0.13);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --max: 1040px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, rgba(240, 184, 75, 0.35), transparent 30rem),
        radial-gradient(circle at 98% 8%, rgba(34, 116, 85, 0.22), transparent 33rem),
        linear-gradient(135deg, #fbf4e8 0%, #f4ead9 48%, #e8f2e5 100%);
      font-family: "IBM Plex Sans KR", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      line-height: 1.55;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(21, 32, 28, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(21, 32, 28, 0.035) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.72), transparent 70%);
    }

    a {
      color: inherit;
    }

    button,
    a,
    [role="link"] {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      font: inherit;
    }

    .page {
      width: min(var(--max), calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 72px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 18px;
      padding: clamp(20px, 4vw, 34px);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 251, 243, 0.80));
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "TOKYO";
      position: absolute;
      right: -12px;
      bottom: -36px;
      color: rgba(21, 32, 28, 0.055);
      font-family: "Gowun Dodum", serif;
      font-size: clamp(72px, 18vw, 180px);
      letter-spacing: -0.08em;
      line-height: 1;
      pointer-events: none;
    }

    .hero-top {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      margin: 0 0 10px;
      padding: 7px 12px;
      border-radius: 999px;
      color: var(--green-dark);
      background: rgba(223, 242, 223, 0.82);
      font-size: 13px;
      font-weight: 800;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-family: "Gowun Dodum", "IBM Plex Sans KR", serif;
      font-size: clamp(44px, 8vw, 82px);
      line-height: 0.98;
      letter-spacing: -0.07em;
    }

    .hero-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .hero-summary li {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 7px 11px;
      border: 1px solid rgba(21, 32, 28, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      color: #3d4943;
      font-size: 14px;
      font-weight: 800;
    }

    .quick-actions {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 9px;
    }

    .action-chip,
    .route-button,
    .source-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 46px;
      padding: 10px 12px;
      border: 1px solid rgba(21, 32, 28, 0.10);
      border-radius: 999px;
      color: var(--green-dark);
      background: rgba(255, 255, 255, 0.86);
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .action-chip:hover,
    .route-button:hover,
    .source-link:hover,
    .place-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(37, 52, 45, 0.13);
    }

    .map-card.focused {
      border-color: rgba(34, 116, 85, 0.36);
      box-shadow: 0 18px 46px rgba(34, 116, 85, 0.18);
    }

    .action-chip.primary,
    .route-button.primary {
      color: #fff;
      background: var(--green);
      border-color: transparent;
      box-shadow: 0 12px 26px rgba(34, 116, 85, 0.22);
    }

    .mini-card {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .mini-card article {
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.75);
    }

    .mini-card b {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
      color: var(--green-dark);
    }

    .mini-card span {
      color: #3d4943;
      font-size: 14px;
      font-weight: 700;
    }

    .tabs-shell {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: 18px -4px 0;
      padding: 8px 4px;
      background: linear-gradient(to bottom, rgba(251, 244, 232, 0.96), rgba(251, 244, 232, 0.72));
      backdrop-filter: blur(14px);
      overflow-x: auto;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 8px;
      min-width: 580px;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 12px 30px rgba(37, 52, 45, 0.09);
    }

    .tab {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      background: transparent;
      font-weight: 900;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease, transform 150ms ease;
    }

    .tab:hover {
      transform: translateY(-1px);
      color: var(--ink);
      background: rgba(34, 116, 85, 0.08);
    }

    .tab[aria-selected="true"] {
      color: #fff;
      background: var(--green-dark);
      box-shadow: 0 10px 22px rgba(20, 63, 49, 0.24);
    }

    .day-panel {
      display: none;
      margin-top: 14px;
      animation: rise 260ms ease both;
    }

    .day-panel.active {
      display: block;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .day-hero,
    .section-card,
    .place-card,
    .map-card,
    .extra-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--card);
      box-shadow: 0 12px 34px rgba(37, 52, 45, 0.09);
      backdrop-filter: blur(14px);
    }

    .day-hero {
      padding: clamp(18px, 3vw, 26px);
    }

    .narrative {
      margin: 0 0 16px;
      color: #39473f;
      font-size: clamp(18px, 2.5vw, 22px);
      font-weight: 800;
    }

    .time-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    .time-pill {
      min-height: 66px;
      padding: 11px;
      border: 1px solid rgba(21, 32, 28, 0.08);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.70);
    }

    .time-pill time {
      display: block;
      color: var(--green-dark);
      font-size: 16px;
      font-weight: 900;
    }

    .time-pill span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .route-flow {
      position: relative;
      overflow: hidden;
      margin: 0 0 14px;
      border: 1px solid rgba(21, 32, 28, 0.10);
      border-radius: 24px;
      background: #f8ead7;
      box-shadow: 0 18px 42px rgba(37, 52, 45, 0.14);
    }

    .route-image {
      display: block;
      width: 100%;
      max-height: min(70vh, 760px);
      object-fit: contain;
      background: #f8ead7;
    }

    .route-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(300px, 0.95fr);
      gap: 14px;
      align-items: start;
      margin-top: 14px;
    }

    .section-card {
      min-width: 0;
      padding: 18px;
    }

    .section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 12px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-size: 19px;
      letter-spacing: -0.02em;
    }

    .place-carousel-tools {
      display: none;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .place-nav {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(21, 32, 28, 0.10);
      border-radius: 999px;
      color: var(--green-dark);
      background: rgba(255, 255, 255, 0.82);
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
    }

    .place-counter {
      min-width: 42px;
      text-align: center;
    }

    .places {
      display: grid;
      gap: 10px;
    }

    .place-card {
      position: relative;
      display: block;
      width: 100%;
      padding: 10px 10px 16px;
      color: inherit;
      text-align: left;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
    }

    .place-card-photo {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      margin-bottom: 12px;
      border-radius: 18px;
      background: var(--sand);
      object-fit: cover;
      box-shadow: inset 0 0 0 1px rgba(21, 32, 28, 0.08);
    }

    .place-card.active {
      border-color: rgba(34, 116, 85, 0.48);
      background:
        linear-gradient(135deg, rgba(223, 242, 223, 0.58), rgba(255, 255, 255, 0.92));
      box-shadow: 0 16px 36px rgba(34, 116, 85, 0.16);
    }

    .place-card:focus-visible,
    .tab:focus-visible,
    .action-chip:focus-visible,
    .route-button:focus-visible,
    .source-link:focus-visible {
      outline: 3px solid rgba(240, 184, 75, 0.75);
      outline-offset: 3px;
    }

    .place-top {
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr) 28px;
      gap: 11px;
      align-items: start;
    }

    .icon-box {
      display: inline-grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 16px;
      background: var(--mint);
      font-size: 22px;
    }

    .place-card h3 {
      margin: 0 0 3px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .place-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .external-mark {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      color: var(--green-dark);
      background: rgba(223, 242, 223, 0.9);
      font-weight: 900;
    }

    .place-card.active .external-mark {
      color: #fff;
      background: var(--green);
    }

    .place-facts {
      display: grid;
      gap: 7px;
      margin-top: 13px;
    }

    .fact {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      min-height: 30px;
      color: #3f4d45;
      font-size: 14px;
      font-weight: 750;
    }

    .fact-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--green-dark);
      background: rgba(223, 242, 223, 0.78);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .fact-label.caution {
      color: #693111;
      background: #ffe0c8;
    }

    .fact-label.tip {
      color: #5a3b0a;
      background: #ffe6a6;
    }

    .place-links {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 12px;
    }

    .source-link {
      min-height: 40px;
      padding: 8px 12px;
      color: var(--green-dark);
      font-size: 13px;
      background: rgba(255, 255, 255, 0.78);
    }

    .map-card {
      min-width: 0;
      overflow: hidden;
      background: var(--card-solid);
    }

    .map-card iframe {
      display: block;
      width: 100%;
      min-height: 180px;
      border: 0;
      background: var(--sand);
    }

    .mini-map {
      border-top: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.76);
    }

    .mini-map summary {
      min-height: 46px;
      padding: 12px 14px;
      color: var(--green-dark);
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .map-caption {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding: 13px 14px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .map-title {
      display: block;
      color: var(--green-dark);
      font-size: 15px;
      font-weight: 900;
    }

    .map-subtitle {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .selected-place-panel {
      display: grid;
      gap: 11px;
      padding: 14px;
    }

    .detail-heading {
      display: grid;
      gap: 4px;
    }

    .detail-heading h3 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .detail-heading p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .selected-place-panel .place-facts {
      margin-top: 0;
    }

    .selected-place-panel .place-links {
      margin-top: 2px;
    }

    .selected-empty {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 750;
    }

    .overview-modal[hidden] {
      display: none;
    }

    .overview-modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      padding: 0;
      background:
        radial-gradient(circle at 20% 8%, rgba(240, 184, 75, 0.22), transparent 18rem),
        linear-gradient(145deg, rgba(20, 63, 49, 0.96), rgba(16, 28, 25, 0.98));
      color: #fffdf7;
    }

    .overview-modal.is-open {
      animation: overviewFade 180ms ease both;
    }

    @keyframes overviewFade {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    body.overview-locked {
      overflow: hidden;
    }

    .overview-header {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      left: 14px;
      right: 14px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .overview-title {
      display: grid;
      gap: 1px;
    }

    .overview-title strong {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .overview-title span {
      color: rgba(255, 253, 247, 0.72);
      font-size: 13px;
      font-weight: 800;
    }

    .overview-close {
      display: inline-grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      color: #fffdf7;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
      pointer-events: auto;
    }

    .overview-track {
      display: flex;
      gap: 0;
      min-width: 0;
      height: 100dvh;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scroll-padding: 0;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .overview-track::-webkit-scrollbar {
      display: none;
    }

    .overview-slide {
      flex: 0 0 100vw;
      display: grid;
      place-items: center;
      scroll-snap-align: center;
      scroll-snap-stop: always;
    }

    .overview-slide img {
      display: block;
      width: min(100vw, calc(100dvh * 9 / 16));
      height: auto;
      max-height: 100dvh;
      aspect-ratio: 9 / 16;
      border-radius: 0;
      background: #f8ead7;
      box-shadow: none;
      object-fit: contain;
    }

    .overview-footer {
      position: absolute;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 2;
      transform: translateX(-50%);
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .overview-counter {
      color: rgba(255, 253, 247, 0.78);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .overview-dots {
      display: inline-flex;
      gap: 7px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.10);
    }

    .overview-dot {
      width: 8px;
      height: 8px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 253, 247, 0.32);
      cursor: pointer;
    }

    .overview-dot.active {
      width: 26px;
      background: var(--gold);
    }

    .extras {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .extra-card {
      padding: 15px;
    }

    .extra-card h3 {
      display: flex;
      gap: 7px;
      align-items: center;
      margin-bottom: 6px;
      font-size: 16px;
    }

    .extra-card p {
      margin-bottom: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .screen-reader {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .hero-top,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .quick-actions,
      .mini-card {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .place-carousel-tools {
        display: inline-flex;
      }

      .places {
        display: flex;
        gap: 12px;
        margin: 0 -18px;
        padding: 2px 18px 15px;
        overflow-x: auto;
        overscroll-behavior-x: contain;
        scroll-padding: 18px;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }

      .places::-webkit-scrollbar {
        display: none;
      }

      .place-card {
        flex: 0 0 min(82vw, 390px);
        scroll-snap-align: center;
        scroll-snap-stop: always;
      }

      .place-card .place-facts,
      .place-card .place-links {
        display: none;
      }

      .map-card {
        margin-top: -2px;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 18px, var(--max));
        padding-top: 10px;
      }

      .hero {
        border-radius: 26px;
      }

      .quick-actions,
      .mini-card,
      .time-strip,
      .extras {
        grid-template-columns: 1fr;
      }

      .tabs-shell {
        margin-left: -9px;

        times: [["오전", "체크아웃"], ["낮", "네즈"], ["15:30", "NRT 목표"]],

            tip: "쇼핑은 공항 여유가 있을 때만",

          }
        ],
        extras: [
          ["살 것", "마지막 쇼핑은 공항 도착 여유가 있을 때만."],

    const tabsRoot = document.querySelector("#day-tabs");
    const panelsRoot = document.querySelector("#day-panels");
    const panelTemplate = document.querySelector("#day-panel-template");
    const overviewTrigger = document.querySelector(".overview-trigger");
    const overviewModal = document.querySelector("#overview-modal");
    const overviewTrack = overviewModal.querySelector(".overview-track");
    const overviewClose = overviewModal.querySelector(".overview-close");
    const overviewCounter = overviewModal.querySelector(".overview-counter");
    const overviewDots = overviewModal.querySelector(".overview-dots");
    const overviewCards = [
      ["개요", "assets/generated-cards/overview.webp"],
      ["Day 1", "assets/generated-cards/day1.webp"],
      ["Day 2", "assets/generated-cards/day2.webp"],
      ["Day 3", "assets/generated-cards/day3.webp"],
      ["Day 4", "assets/generated-cards/day4.webp"]
    ];
    let overviewInitialized = false;
    let overviewPreloaded = false;
    let overviewScrollTimer = 0;
    let overviewLastFocus = null;

    function createFact(label, value, type = "") {
      if (!value) return null;
      const fact = document.createElement("div");
      fact.className = "fact";
      const factLabel = document.createElement("span");
      factLabel.className = `fact-label ${type}`.trim();
      factLabel.textContent = label;
      const factValue = document.createElement("span");
      factValue.textContent = value;
      fact.append(factLabel, factValue);
      return fact;
    }

    function preloadOverviewCard() {
      if (overviewPreloaded) return;
      overviewPreloaded = true;
      const link = document.createElement("link");
      link.rel = "preload";
      link.as = "image";
      link.href = overviewCards[0][1];
      document.head.append(link);
    }

    function setOverviewIndex(index, shouldScroll = false) {
      const safeIndex = Math.max(0, Math.min(overviewCards.length - 1, index));
      overviewCounter.textContent = `${safeIndex + 1} / ${overviewCards.length}`;
      overviewDots.querySelectorAll(".overview-dot").forEach((dot, dotIndex) => {
        dot.classList.toggle("active", dotIndex === safeIndex);
        dot.setAttribute("aria-current", dotIndex === safeIndex ? "true" : "false");
      });

      if (shouldScroll) {
        const slide = overviewTrack.children[safeIndex];
        if (slide) {
          const targetLeft = slide.offsetLeft - (overviewTrack.clientWidth - slide.offsetWidth) / 2;
          overviewTrack.scrollTo({ left: targetLeft, behavior: "smooth" });
        }
      }
    }

    function initializeOverviewCards() {
      if (overviewInitialized) return;
      overviewInitialized = true;

      overviewCards.forEach(([label, src], index) => {
        const slide = document.createElement("figure");
        slide.className = "overview-slide";
        const card = document.createElement("img");
        card.src = src;
        card.alt = `${label} 여행 동선 한눈에보기 카드`;
        card.decoding = "async";
        card.loading = index === 0 ? "eager" : "lazy";
        slide.append(card);
        overviewTrack.append(slide);

        const dot = document.createElement("button");
        dot.className = "overview-dot";
        dot.type = "button";
        dot.setAttribute("aria-label", `${label} 카드 보기`);
        dot.addEventListener("click", () => setOverviewIndex(index, true));
        overviewDots.append(dot);
      });

      setOverviewIndex(0);
    }

    function openOverview() {
      overviewLastFocus = document.activeElement;
      initializeOverviewCards();
      overviewModal.hidden = false;
      overviewModal.classList.add("is-open");
      document.body.classList.add("overview-locked");
      requestAnimationFrame(() => {
        overviewTrack.scrollTo({ left: 0, behavior: "instant" });
        setOverviewIndex(0);
        overviewClose.focus({ preventScroll: true });
      });
    }

    function closeOverview() {
      overviewModal.classList.remove("is-open");
      overviewModal.hidden = true;
      document.body.classList.remove("overview-locked");
      overviewLastFocus?.focus?.({ preventScroll: true });
    }

    function syncOverviewFromScroll() {
      window.clearTimeout(overviewScrollTimer);
      overviewScrollTimer = window.setTimeout(() => {
        const center = overviewTrack.scrollLeft + overviewTrack.clientWidth / 2;
        let nearestIndex = 0;
        let nearestDistance = Number.POSITIVE_INFINITY;
        [...overviewTrack.children].forEach((slide, index) => {
          const slideCenter = slide.offsetLeft + slide.offsetWidth / 2;
          const distance = Math.abs(slideCenter - center);
          if (distance < nearestDistance) {
            nearestDistance = distance;
            nearestIndex = index;
          }
        });
        setOverviewIndex(nearestIndex);
      }, 80);
    }

    function setMapCaption(panel, title, subtitle, url) {
      const captionText = panel.querySelector(".map-caption span");
      captionText.innerHTML = `<span class="map-title">${title}</span><span class="map-subtitle">${subtitle}</span>`;
      const mapLink = panel.querySelector(".map-caption a");
      mapLink.href = url;
      mapLink.textContent = "지도 ↗";
    }

    function createPlaceLinks(place) {
      const links = document.createElement("div");
      links.className = "place-links";
      const mapLink = document.createElement("a");
      mapLink.className = "source-link";
      mapLink.href = place.mapUrl;
      mapLink.target = "_blank";
      mapLink.rel = "noreferrer";
      mapLink.textContent = "🗺️ 지도";
      mapLink.addEventListener("click", (event) => event.stopPropagation());
      links.append(mapLink);

      (place.sources || []).forEach(([label, url]) => {
        const source = document.createElement("a");
        source.className = "source-link";
        source.href = url;
        source.target = "_blank";
        source.rel = "noreferrer";
        source.textContent = `${label} ↗`;
        source.addEventListener("click", (event) => event.stopPropagation());
        links.append(source);
      });

      return links;
    }

    function renderSelectedPlacePanel(panel, place) {
      const detailPanel = panel.querySelector(".selected-place-panel");
      detailPanel.innerHTML = "";

      const heading = document.createElement("div");
      heading.className = "detail-heading";
      const title = document.createElement("h3");
      title.textContent = place.name;
      const action = document.createElement("p");
      action.textContent = place.action;
      heading.append(title, action);
      detailPanel.append(heading);

      const facts = document.createElement("div");
      facts.className = "place-facts";
      [
        createFact("시간", place.time),
        createFact("준비", place.prepare),
        createFact("주의", place.caution, "caution"),
        createFact("팁", place.tip, "tip")
      ].filter(Boolean).forEach((fact) => facts.append(fact));

      if (facts.children.length) {
        detailPanel.append(facts);
      } else {
        const empty = document.createElement("p");
        empty.className = "selected-empty";
        empty.textContent = "이 장소는 대표 이미지만 확인하면 됩니다.";
        detailPanel.append(empty);
      }

      detailPanel.append(createPlaceLinks(place));
    }

    function syncPlaceCounter(panel, index) {
      const counter = panel.querySelector(".place-counter");
      const total = panel.__places?.length || 0;
      if (!counter || !total) return;
      counter.textContent = `${index + 1} / ${total}`;
    }

    function focusPlaceMap(panel, place, card) {
      const iframe = panel.querySelector("iframe");
      const mapCard = panel.querySelector(".map-card");
      iframe.src = place.embedUrl || place.mapUrl;
      iframe.title = `${place.name} 지도`;
      setMapCaption(panel, place.name, place.action, place.mapUrl);
      renderSelectedPlacePanel(panel, place);

      panel.querySelectorAll(".place-card").forEach((item) => {
        item.classList.toggle("active", item === card);
        item.setAttribute("aria-pressed", String(item === card));
      });
      mapCard.classList.add("focused");
      syncPlaceCounter(panel, Number(card.dataset.index || 0));
    }

    function scrollToPlace(panel, index) {
      const card = panel.__cards?.[index];
      if (!card) return;
      card.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      focusPlaceMap(panel, panel.__places[index], card);
    }

    function setupPlaceCarousel(panel) {
      const places = panel.querySelector(".places");
      let scrollTimer = 0;

      places.addEventListener("scroll", () => {
        window.clearTimeout(scrollTimer);
        scrollTimer = window.setTimeout(() => {
          if (!window.matchMedia("(max-width: 900px)").matches) return;
          const center = places.scrollLeft + places.clientWidth / 2;
          let nearestIndex = 0;
          let nearestDistance = Number.POSITIVE_INFINITY;

          panel.__cards.forEach((card, index) => {
            const cardCenter = card.offsetLeft + card.offsetWidth / 2;
            const distance = Math.abs(cardCenter - center);
            if (distance < nearestDistance) {
              nearestDistance = distance;
              nearestIndex = index;
            }
          });

          focusPlaceMap(panel, panel.__places[nearestIndex], panel.__cards[nearestIndex]);
        }, 90);
      }, { passive: true });

      panel.querySelector(".place-prev").addEventListener("click", () => {
        const current = Number(panel.querySelector(".place-card.active")?.dataset.index || 0);
        scrollToPlace(panel, Math.max(0, current - 1));
      });

      panel.querySelector(".place-next").addEventListener("click", () => {
        const current = Number(panel.querySelector(".place-card.active")?.dataset.index || 0);
        scrollToPlace(panel, Math.min(panel.__places.length - 1, current + 1));
      });
    }

    function createPlaceCard(place) {
      const card = document.createElement("article");
      card.className = "place-card";
      card.tabIndex = 0;
      card.role = "button";
      card.setAttribute("aria-label", `${place.name} 지도 미리보기`);
      card.setAttribute("aria-pressed", "false");
      card.dataset.mapUrl = place.mapUrl;
      card.dataset.embedUrl = place.embedUrl || "";

      if (place.photo) {
        const photo = document.createElement("img");
        photo.className = "place-card-photo";
        photo.src = place.photo;
        photo.alt = place.photoAlt || `${place.name} 대표 이미지`;
        photo.loading = "lazy";
        photo.decoding = "async";
        card.append(photo);
      }

      const top = document.createElement("div");
      top.className = "place-top";
      const icon = document.createElement("div");
      icon.className = "icon-box";
      icon.setAttribute("aria-hidden", "true");
      icon.textContent = iconMap[place.icon] || "📍";

      const copy = document.createElement("div");
      const title = document.createElement("h3");
      title.textContent = place.name;
      const action = document.createElement("p");
      action.textContent = place.action;
      copy.append(title, action);

      const mark = document.createElement("span");
      mark.className = "external-mark";
      mark.setAttribute("aria-hidden", "true");
      mark.textContent = "⌖";
      top.append(icon, copy, mark);

      const facts = document.createElement("div");
      facts.className = "place-facts";
      [
        createFact("시간", place.time),
        createFact("준비", place.prepare),
        createFact("주의", place.caution, "caution"),
        createFact("팁", place.tip, "tip")
      ].filter(Boolean).forEach((fact) => facts.append(fact));

      card.append(top, facts, createPlaceLinks(place));
      return card;
    }

    function renderDay(day, index) {
      const tab = document.createElement("button");
      tab.className = "tab";
      tab.type = "button";
      tab.role = "tab";
      tab.id = `tab-${day.id}`;
      tab.dataset.day = day.id;
      tab.setAttribute("aria-controls", day.id);
      tab.setAttribute("aria-selected", String(index === 0));
      tab.textContent = `${day.label} · ${day.date}`;
      tabsRoot.append(tab);

      const panel = panelTemplate.content.firstElementChild.cloneNode(true);
      panel.id = day.id;
      panel.setAttribute("aria-labelledby", tab.id);
      if (index === 0) panel.classList.add("active");
      panel.querySelector(".narrative").textContent = day.narrative;

      const timeStrip = panel.querySelector(".time-strip");
      day.times.forEach(([time, label]) => {
        const item = document.createElement("div");
        item.className = "time-pill";
        item.innerHTML = `<time>${time}</time><span>${label}</span>`;
        timeStrip.append(item);
      });

      const routeFlow = panel.querySelector(".route-flow");
      if (day.routeImage) {
        const routeImage = document.createElement("img");
        routeImage.className = "route-image";
        routeImage.src = day.routeImage;
        routeImage.alt = day.routeImageAlt || `${day.label} 동선 이미지`;
        routeImage.loading = index === 0 ? "eager" : "lazy";
        routeImage.decoding = "async";
        routeFlow.append(routeImage);
      }
      const routeText = document.createElement("p");
      routeText.className = "screen-reader";
      routeText.textContent = day.route.join(" → ");
      routeFlow.append(routeText);

      const routeActions = panel.querySelector(".route-actions");
      day.routeActions.forEach(([label, url, primary]) => {
        const link = document.createElement("a");
        link.className = `route-button ${primary ? "primary" : ""}`.trim();
        link.href = url;
        link.target = "_blank";
        link.rel = "noreferrer";
        link.textContent = label;
        routeActions.append(link);
      });

      const places = panel.querySelector(".places");
      panel.__places = day.places;
      panel.__cards = [];
      day.places.forEach((place, placeIndex) => {
        const card = createPlaceCard(place);
        card.dataset.index = String(placeIndex);
        card.addEventListener("click", () => {
          focusPlaceMap(panel, place, card);
          if (window.matchMedia("(max-width: 900px)").matches) {
            card.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
          }
        });
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            focusPlaceMap(panel, place, card);
          }
        });
        places.append(card);
        panel.__cards.push(card);
      });

      const iframe = panel.querySelector("iframe");
      iframe.title = `${day.label} 지도`;
      iframe.src = day.map.embed;
      setMapCaption(panel, day.map.caption, "장소를 넘기면 지도와 팁이 바뀝니다.", day.map.url);
      setupPlaceCarousel(panel);
      if (day.places.length) {
        focusPlaceMap(panel, day.places[0], panel.__cards[0]);
      }

      const extras = panel.querySelector(".extras");
      day.extras.forEach(([title, body]) => {
        const item = document.createElement("article");
        item.className = "extra-card";
        item.innerHTML = `<h3>${title}</h3><p>${body}</p>`;
        extras.append(item);
      });

      panelsRoot.append(panel);
    }

    function activate(dayId, updateHash = true) {
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.setAttribute("aria-selected", String(tab.dataset.day === dayId));
      });
      document.querySelectorAll(".day-panel").forEach((panel) => {
        panel.classList.toggle("active", panel.id === dayId);
      });
      if (updateHash) history.replaceState(null, "", `#${dayId}`);
    }

    tripDays.forEach(renderDay);

    tabsRoot.addEventListener("click", (event) => {
      const tab = event.target.closest(".tab");
      if (!tab) return;
      activate(tab.dataset.day);
    });

    overviewTrigger.addEventListener("pointerenter", preloadOverviewCard, { once: true });
    overviewTrigger.addEventListener("touchstart", preloadOverviewCard, { once: true, passive: true });
    overviewTrigger.addEventListener("click", openOverview);
    overviewClose.addEventListener("click", closeOverview);
    overviewTrack.addEventListener("scroll", syncOverviewFromScroll, { passive: true });
    overviewModal.addEventListener("click", (event) => {
      if (event.target === overviewModal) closeOverview();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !overviewModal.hidden) closeOverview();
    });

    const initialDay = location.hash.replace("#", "");
    if (tripDays.some((day) => day.id === initialDay)) {
      activate(initialDay, false);
    }
  </script>
