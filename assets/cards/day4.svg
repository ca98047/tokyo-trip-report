<path d="M170 1306 L170 1330" stroke="#227455" stroke-width="7" stroke-linecap="round" stroke-dasharray="1 16"/>
<circle cx="170" cy="1364" r="30" fill="#227455" stroke="#fff8ec" stroke-width="7"/><text class="num" x="170" y="1374" text-anchor="middle">3</text><text class="node" x="222" y="1374">네즈 카페</text>
<path d="M170 1398 L170 1422" stroke="#227455" stroke-width="7" stroke-linecap="round" stroke-dasharray="1 16"/>
