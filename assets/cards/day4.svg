<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">DAY 4 · 6/2 화 네즈 찍고 공항으로</title>
  <desc id="desc">실제 장소 사진으로 구성한 도쿄여행 day4 한눈에보기 카드</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fff8ec"/><stop offset=".58" stop-color="#f8ead7"/><stop offset="1" stop-color="#e8f2e5"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#614b35" flood-opacity=".18"/></filter>
    <style>
      .kicker{font:800 34px 'IBM Plex Sans KR','Apple SD Gothic Neo',sans-serif;fill:#375447}
      .title{font:900 80px 'IBM Plex Sans KR','Apple SD Gothic Neo',sans-serif;fill:#3a7289;letter-spacing:-4px}
      .subtitle{font:800 30px 'IBM Plex Sans KR','Apple SD Gothic Neo',sans-serif;fill:#5d6b61}
      .photoLabel{font:900 27px 'IBM Plex Sans KR','Apple SD Gothic Neo',sans-serif;fill:#173f32}
      .node{font:900 30px 'IBM Plex Sans KR','Apple SD Gothic Neo',sans-serif;fill:#173f32}
      .num{font:900 27px 'IBM Plex Sans KR','Apple SD Gothic Neo',sans-serif;fill:#fff}
      .note{font:800 29px 'IBM Plex Sans KR','Apple SD Gothic Neo',sans-serif;fill:#6a5848}
      .stamp{font:900 28px 'IBM Plex Sans KR','Apple SD Gothic Neo',sans-serif;fill:#3a7289}
    </style>
  </defs>
  <rect width="1080" height="1920" fill="url(#paper)"/>
  <g opacity=".16" stroke="#c8aa8b" stroke-width="3">
    <path d="M84 372h912M84 520h912M84 668h912M84 816h912M84 964h912M84 1112h912M84 1260h912M84 1408h912M84 1556h912"/>
    <path d="M152 320v1270M300 320v1270M448 320v1270M596 320v1270M744 320v1270M892 320v1270"/>
  </g>
