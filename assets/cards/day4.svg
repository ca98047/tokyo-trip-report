<path d="M170 1490 L170 1514" stroke="#227455" stroke-width="7" stroke-linecap="round" stroke-dasharray="1 16"/>
<circle cx="170" cy="1548" r="30" fill="#227455" stroke="#fff8ec" stroke-width="7"/><text class="num" x="170" y="1558" text-anchor="middle">5</text><text class="node" x="222" y="1558">나리타공항</text></g>
  <rect x="70" y="1518" width="940" height="188" rx="34" fill="#fffdf7" stroke="#dec9aa" stroke-width="4"/>
